<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christy Stores</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
header{background:#2874f0;color:#fff;padding:10px;display:flex;gap:10px;align-items:center;}
.logo{font-weight:bold;}
.search{flex:1;padding:6px;border:none;border-radius:4px;}

.banner{background:#ffe500;padding:8px;text-align:center;font-weight:bold;}

.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px;}

.product{background:#fff;padding:10px;border-radius:6px;}
.product img{width:100%;height:120px;object-fit:cover;}
.price{color:green;font-weight:bold;}
.old{color:#999;text-decoration:line-through;font-size:12px;}
.rating{background:green;color:#fff;padding:2px 5px;font-size:12px;border-radius:3px;display:inline-block;margin:4px 0;}

button{background:#fb641b;color:#fff;border:none;padding:8px;width:100%;margin-top:8px;border-radius:4px;}

form{background:#fff;padding:10px;margin:10px;border-radius:6px;}
input{width:100%;padding:8px;margin:5px 0;}
</style>
</head>

<body>

<header>
<div class="logo">Christy Stores 🛒</div>
<input class="search" placeholder="Search for products...">
</header>

<div class="banner">🔥 50% OFF + Free Delivery 🔥</div>

<div class="container" id="products"></div>

<form id="orderForm">
<h3>Place Order (COD)</h3>
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="address" placeholder="Your Address" required>
<input type="text" id="phone" placeholder="Your Phone" required>
<button type="submit">Order Now</button>
</form>

<script>
const whatsappNumber = "919876543210"; // CHANGE THIS

const products = [
  {
    name:"Smart Watch Full Touch Display",
    price:1499,
    old:2999,
    rating:"4.3★",
    img:"https://m.media-amazon.com/images/I/61IMRs+o0iL._SX679_.jpg"
  }
];

function loadProducts(){
  const box=document.getElementById("products");
  products.forEach(p=>{
    box.innerHTML+=`
    <div class="product">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <div class="rating">${p.rating}</div>
      <div class="price">₹${p.price} <span class="old">₹${p.old}</span></div>
      <p style="color:red;font-size:12px;">Only 5 left!</p>
      <button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
    </div>`;
  });
}

function buyNow(name,price){
  const msg = "I want to order " + name + " for ₹" + price;
  window.open("https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(msg));
}

document.getElementById("orderForm").onsubmit = function(e){
  e.preventDefault();
  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;
  const phone = document.getElementById("phone").value;

  const msg = "New Order:\nName: " + name + "\nAddress: " + address + "\nPhone: " + phone;
  window.open("https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(msg));
}

loadProducts();
</script>

</body>
  </html>
