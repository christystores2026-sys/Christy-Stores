<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Style Store</title>
<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
header{background:#2874f0;color:#fff;padding:12px;text-align:center;font-size:20px;font-weight:bold;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;padding:15px;}
.product{background:#fff;border-radius:8px;padding:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);} 
.product img{width:100%;height:140px;object-fit:cover;border-radius:5px;}
.price{color:#388e3c;font-weight:bold;}
.old{color:#999;text-decoration:line-through;font-size:12px;}
button{background:#fb641b;color:#fff;border:none;padding:8px;width:100%;margin-top:8px;border-radius:5px;font-weight:bold;cursor:pointer;}
button:hover{background:#e55300;}
</style>
</head>
<body><header>My Flipkart Store 🛒</header><div class="container" id="products"></div><script>
const whatsappNumber = "7397418053"; // CHANGE THIS

const products = [
  {name:"Wireless Earbuds", price:999, old:1999, img:"https://via.placeholder.com/200"},
  {name:"Smart Watch", price:1499, old:2999, img:"https://via.placeholder.com/200"},
  {name:"Bluetooth Speaker", price:799, old:1599, img:"https://via.placeholder.com/200"},
  {name:"Mobile Cover", price:199, old:499, img:"https://via.placeholder.com/200"}
];

function loadProducts(){
  const box=document.getElementById("products");
  products.forEach(p=>{
    box.innerHTML+=`
    <div class="product">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <div class="price">₹${p.price} <span class="old">₹${p.old}</span></div>
      <button onclick="orderNow('${p.name}',${p.price})">Buy Now</button>
    </div>`;
  });
}

function orderNow(name,price){
  const msg = `I want to order ${name} for ₹${price}`;
  const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

loadProducts();
</script></body>
</html>
