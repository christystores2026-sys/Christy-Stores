<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Style Store</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6;}
header{background:#2874f0;color:#fff;padding:10px;display:flex;align-items:center;gap:10px;}
.logo{font-weight:bold;}
.search{flex:1;padding:6px;border:none;border-radius:4px;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px;}
.product{background:#fff;padding:10px;border-radius:6px;}
.product img{width:100%;height:120px;object-fit:cover;}
.price{color:green;font-weight:bold;}
.old{color:#999;text-decoration:line-through;font-size:12px;}
button{background:#fb641b;color:#fff;border:none;padding:8px;width:100%;margin-top:8px;border-radius:4px;}
</style>

</head>
<body>

<header>
<div class="logo">Christy Stores🛒</div>
<input class="search" placeholder="Search for products...">
</header>

<div class="container" id="products"></div>

<script>
const whatsappNumber = "7397418053"; // CHANGE

const products = [
  {name:"Wireless Earbuds", price:999, old:1999, img:"https://m.media-amazon.com/images/I/61LtuGzXeaL._SX679_.jpg"},
  {name:"Smart Watch", price:1499, old:2999, img:"https://m.media-amazon.com/images/I/61IMRs+o0iL._SX679_.jpg"}
];

function loadProducts(){
  const box=document.getElementById("products");
  products.forEach(p=>{
    box.innerHTML+=`<p style="color:red;font-size:12px;">Only 3 left!</p>
    <div class="product"><p style="color:green;">50% OFF + Free Delivery</p>
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <div class="price">₹${p.price} <span class="old">₹${p.old}</span></div>
      <button onclick="orderNow('${p.name}',${p.price})">Buy Now</button>
    </div>`;
  });
}

function orderNow(name,price){
  const msg = "I want to order " + name + " for ₹" + price;
  const url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(msg);
  window.open(url,'_blank');
}

loadProducts();
</script>

</body>
</html>
<div style="background:green;color:white;padding:2px 5px;border-radius:3px;display:inline-block;">4.3 ★</div>
